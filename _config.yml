# Site settings
title: "Adithya's Blog"
title_separator: "-"
subtitle: "Data Science | AI | Cloud"
name: "Adithya"
description: "Data Science | AI | Cloud"
url: "https://adithyabvds.github.io"
baseurl: "/blog"
repository: "adithyabvds/blog"
locale: "en-US"
timezone: "Asia/Kolkata"

# Theme settings
# GitHub Pages supports the remote_theme plugin, which lets us use
# Minimal Mistakes without copying the theme files into this repository.
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "default"

# Plugins supported by GitHub Pages
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep Markdown simple and beginner-friendly.
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# These defaults reduce repetition in your posts and pages.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: false
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Author profile shown in the sidebar/profile area.
author:
  name: "Adithya"
  # Add this later if you want a profile photo:
  # avatar: "/assets/images/bio-photo.jpg"
  bio: "Exploring data science, AI, and cloud through practical projects and clear writing."
  location: "India"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/adithyabvds"

# Archive pages used by the navigation menu.
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# Minimal Mistakes behavior
search: false
breadcrumbs: false
read_time: true
words_per_minute: 200

# Build settings
include:
  - _pages
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
